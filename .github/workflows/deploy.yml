name: Spring-boot CI/CD pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: spring-boot-cicd-test
  CONTAINER_NAME: spring-boot-cicd-test-container

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setting up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Building docker image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest .

      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Push image to Dockerhub
        run: docker push ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest

      - name: Deploy to AWS EC2
        uses: appleboy/ssh_action@1.2.0
        with:
          host: ${{secrets.AWS_EC2_HOST}}
          username: ${{secrets.AWS_EC2_USERNAME}}
          key: ${{secrets.AWS_EC2_SSH_KEY}}
          script: |
            docker pull ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest
            docker stop ${{env.CONTAINER_NAME}} || true
            docker rm ${{env.CONTAINER_NAME}} || true
            docker run -d --name ${{env.CONTAINER_NAME}} --restart unless-stopped -p 8080:8080 ${{secrets.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}:latest
            docker image prune -f
